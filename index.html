<!DOCTYPE html>
<html>
  <head>
    <meta charset="utf-8">
    <title>Gêmeo Digital - Simulação Logística 3D</title>
    <!-- Biblioteca estável do A-Frame para Realidade Virtual -->
    <script src="https://aframe.io"></script>
  </head>
  <body>
    <a-scene>
      <a-assets>
        <!-- Link oficial do seu vídeo do Dropbox configurado com dl=1 -->
        <video id="logistica-video" src="https://dropbox.com" crossorigin="anonymous" playsinline type="video/mp4"></video>
      </a-assets>

      <!-- Transforma o seu vídeo do Gemini Omni em uma esfera imersiva de 360° -->
      <a-videosphere src="#logistica-video" rotation="0 -90 0"></a-videosphere>

      <!-- Configura a câmera e o ponteiro visual interno dos óculos -->
      <a-camera look-controls>
        <a-cursor></a-cursor>
      </a-camera>
      
      <!-- Ativa o suporte nativo para os gatilhos dos controles do Meta Quest -->
      
    </a-scene>

    <script>
      const video = document.querySelector('#logistica-video');
      // Marcadores fixos de tempo para as 5 áreas logísticas (10s, 20s, 30s, 40s)
      const paradas = [10, 20, 30, 40];
      let proximaParadaIdx = 0;

      // Inicia o vídeo pausado na primeira cena assim que a página é carregada
      window.addEventListener('load', () => {
        video.pause();
        video.currentTime = 0;
      });

      // Função para avançar as estações acionada pelo controle ou clique na tela
      function gerenciarFluxo() {
        if (video.paused) {
          // Se chegou muito perto do final do vídeo, reseta todo o ciclo para o próximo visitante
          if (video.currentTime >= 49) {
            video.currentTime = 0;
            proximaParadaIdx = 0;
            video.pause();
          } else {
            video.play();
          }
        }
      }

      // Escuta os cliques físicos na tela do celular, mouse no laptop ou gatilho dos óculos VR
      window.addEventListener('click', gerenciarFluxo);
      window.addEventListener('touchstart', gerenciarFluxo);

      // Monitora a reprodução segundo a segundo para pausar na marca correta de forma segura
      video.addEventListener('timeupdate', () => {
        if (proximaParadaIdx < paradas.length) {
          if (video.currentTime >= paradas[proximaParadaIdx]) {
            video.pause();
            // Trava o vídeo exatamente na marca de tempo da estação
            video.currentTime = paradas[proximaParadaIdx];
            proximaParadaIdx++;
          }
        } else if (video.currentTime >= 49.5) {
          // Pausa automática no final absoluto do vídeo (área do caminhão)
          video.pause();
        }
      });
    </script>
  </body>
</html>
